<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon site GitHub Pages</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    nav {
      background-color: #333;
      color: white;
      width: 220px;
      padding: 20px;
    }

    nav h2 {
      margin-top: 0;
      font-size: 18px;
    }

    nav ul {
      list-style: none;
      padding: 0;
    }

    nav ul li {
      margin: 10px 0;
    }

    nav ul li a {
      color: white;
      text-decoration: none;
    }

    nav ul li a:hover {
      text-decoration: underline;
    }

    /* Content */
    main {
      flex: 1;
      padding: 20px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      body {
        flex-direction: column;
      }

      nav {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <nav>
    <h2>Menu</h2>
    <ul>
      <li><a href="index.html">Accueil</a></li>
      <li><a href="page1.html">Page 1</a></li>
      <li><a href="page2.html">Page 2</a></li>
    </ul>
  </nav>

  <main>
    <h1>Bienvenue</h1>
    <p>Ceci est une page simple pour GitHub Pages.</p>
  </main>

</body>
</html>
